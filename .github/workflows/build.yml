name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 使用专门的 Android 14 兼容镜像
      - name: Build with Python 3.8 + Kivy 2.3
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/home/user/hostcwd
          run: |
            cd /home/user/hostcwd
            
            export TERM=dumb
            export DEBIAN_FRONTEND=noninteractive
            
            # 清理
            rm -rf .buildozer bin
            
            # 构建
            echo "Starting build with Kivy 2.3.0..."
            yes | buildozer -v android debug 2>&1 | tee build.log
            
            # 验证
            if [ -f bin/*.apk ]; then
              echo "SUCCESS: APK created!"
              ls -lh bin/*.apk
            else
              echo "FAILED: No APK found"
              tail -100 build.log
              exit 1
            fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
