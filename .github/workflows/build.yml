name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build APK with Buildozer (Docker)
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/home/user/hostcwd
          run: |
            cd /home/user/hostcwd
            
            # 设置环境变量，自动确认所有提示
            export TERM=dumb
            export DEBIAN_FRONTEND=noninteractive
            
            # 确保 buildozer.spec 存在
            if [ ! -f buildozer.spec ]; then
              echo "buildozer.spec not found!"
              exit 1
            fi
            
            # 清理旧的构建
            rm -rf .buildozer
            rm -rf bin
            
            # 构建 APK（使用 yes 命令自动回答 y）
            echo "Starting Buildozer build..."
            yes | buildozer -v android debug 2>&1 | tee build.log
            
            # 显示输出
            echo "Build completed!"
            echo "Checking bin directory..."
            ls -lh bin/ || echo "bin directory not found!"
            
            # 验证 APK 文件
            if [ -f bin/*.apk ]; then
              echo "APK file found!"
              ls -lh bin/*.apk
            else
              echo "ERROR: APK file not found!"
              echo "Build log:"
              cat build.log | tail -200
              exit 1
            fi
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
